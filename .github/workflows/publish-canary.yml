name: Publish Canary

on:
  push:
    branches: [main]

jobs:
  publish-canary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for --provenance signing (Sigstore)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      # npm won't accept republishing the same version. This sets a unique canary
      # version for the CI working tree only (no git commit/tag).
      - name: Set canary version
        run: |
          node -e "const p=require('./package.json'); const base=p.version.replace(/-.*/, ''); const sha=process.env.GITHUB_SHA.slice(0,7); const run=process.env.GITHUB_RUN_NUMBER; const v=`${base}-canary.${run}+${sha}`; require('fs').writeFileSync('package.json', JSON.stringify({...p, version:v}, null, 2) + '\n'); console.log('version=', v);"

      - name: Publish canary to npm
        run: npm publish --provenance --access public --tag canary
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

